schema_version: 1

context:
  name: quantstats
  version: "0.0.81"
  python_min: '3.10'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 91f44895e4481167255384c2297193233255b427e3a09a3fa111a5ce77e9b44a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - sample=sample:main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - hatchling
  run:
    - python >=${{ python_min }}
    - pandas >=1.5.0
    - numpy >=1.24.0
    - scipy >=1.11.0
    - matplotlib-base >=3.7.0
    - seaborn >=0.13.0
    - tabulate >=0.9.0
    - yfinance >=0.2.10
    - python-dateutil >=2.8.0

tests:
  - python:
      imports:
        - quantstats
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Portfolio analytics for quants
  license: Apache-2.0
  license_file: LICENSE.txt
  description: |
    QuantStats is a Python library that performs portfolio profiling,
    allowing quants and portfolio managers to understand their
    performance better by providing them with in-depth analytics and
    risk metrics.


  homepage: https://github.com/ranaroussi/quantstats

extra:
  recipe-maintainers:
    - thewchan
